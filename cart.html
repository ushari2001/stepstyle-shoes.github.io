<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StepStyle Shoes - Cart</title>
<style>
    body { margin:0; font-family: Arial; background:#f5f5f5; color:#0d47a1; }
    header { display:flex; justify-content:space-between; align-items:center; padding:20px 50px; background:#0d47a1; color:white; }
    nav a { color:white; margin-left:20px; text-decoration:none; font-weight:bold; }
    main { max-width:900px; margin:50px auto; background:white; padding:30px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.2);}
    h2 { text-align:center; margin-bottom:30px; }
    table { width:100%; border-collapse:collapse; margin-bottom:30px; }
    table, th, td { border:1px solid #0d47a1; }
    th, td { padding:12px; text-align:center; }
    input[type="number"] { width:60px; padding:5px; border-radius:5px; border:1px solid #0d47a1; }
    .total { text-align:right; font-size:20px; font-weight:bold; margin-bottom:20px; }
    button { width:100%; padding:15px; font-size:18px; background:#0d47a1; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
    button:hover { background:#1976d2; }
</style>
</head>
<body>

<header>
    <h1>StepStyle Shoes</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>
    <h2>Shopping Cart</h2>

    <table id="cart-table">
        <tr>
            <th>Product</th>
            <th>Price (LKR)</th>
            <th>Quantity</th>
            <th>Subtotal (LKR)</th>
        </tr>

        <tr>
            <td>Nike Air Max</td>
            <td class="price">15000</td>
            <td><input type="number" min="0" placeholder=""></td>
            <td class="subtotal">0</td>
        </tr>
        <tr>
            <td>Adidas Running Pro</td>
            <td class="price">13500</td>
            <td><input type="number" min="0" placeholder=""></td>
            <td class="subtotal">0</td>
        </tr>
        <tr>
            <td>Puma Casual Walk</td>
            <td class="price">11000</td>
            <td><input type="number" min="0" placeholder=""></td>
            <td class="subtotal">0</td>
        </tr>
        <tr>
            <td>Formal Leather Shoe</td>
            <td class="price">9500</td>
            <td><input type="number" min="0" placeholder=""></td>
            <td class="subtotal">0</td>
        </tr>
        <tr>
            <td>Women Classic Heels</td>
            <td class="price">8000</td>
            <td><input type="number" min="0" placeholder=""></td>
            <td class="subtotal">0</td>
        </tr>
        <tr>
            <td>Sports Sneakers X</td>
            <td class="price">12000</td>
            <td><input type="number" min="0" placeholder=""></td>
            <td class="subtotal">0</td>
        </tr>
    </table>

    <div class="total" id="total-amount">Total Amount: LKR 0</div>
    <button onclick="location.href='checkout.html'">Proceed to Checkout</button>
</main>

<script>
function updateCart() {
    const table = document.getElementById('cart-table');
    let total = 0;

    for (let i = 1; i < table.rows.length; i++) {
        const row = table.rows[i];
        const price = parseInt(row.querySelector('.price').innerText);
        let qty = parseInt(row.querySelector('input').value);

        if (isNaN(qty) || qty < 0) qty = 0;

        const subtotal = price * qty;
        row.querySelector('.subtotal').innerText = subtotal.toLocaleString();
        total += subtotal;
    }

    document.getElementById('total-amount').innerText =
        "Total Amount: LKR " + total.toLocaleString();
}

const qtyInputs = document.querySelectorAll('input[type="number"]');
qtyInputs.forEach(input => input.addEventListener('input', updateCart));
</script>

</body>
</html>
