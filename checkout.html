<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StepStyle Shoes - Checkout</title>
<style>
    body { margin:0; font-family: Arial; background:#f5f5f5; color:#0d47a1; }
    header { display:flex; justify-content:space-between; align-items:center; padding:20px 50px; background:#0d47a1; color:white; }
    nav a { color:white; margin-left:20px; text-decoration:none; font-weight:bold; }
    main { max-width:700px; margin:50px auto; background:white; padding:30px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.2);}
    h2 { text-align:center; margin-bottom:30px; }
    label { display:block; margin-top:15px; font-weight:bold; }
    input, select, textarea { width:100%; padding:10px; margin-top:5px; border-radius:5px; border:1px solid #0d47a1; }
    textarea { resize: vertical; }
    .payment-method { display:flex; gap:15px; margin-top:10px; }
    .bank-details { display:none; margin-top:15px; padding:15px; border:1px solid #0d47a1; border-radius:5px; background:#e3f2fd; }
    .points-field { display:none; margin-top:10px; }
    button { width:100%; padding:15px; font-size:18px; background:#0d47a1; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold; margin-top:20px;}
    button:hover { background:#1976d2; }
</style>
</head>
<body>

<header>
    <h1>StepStyle Shoes</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>
    <h2>Checkout</h2>
    <form id="checkout-form">

        <label>Full Name</label>
        <input type="text" name="fullname" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Phone Number</label>
        <input type="number" name="phone" required>

        <label>Delivery Address</label>
        <textarea name="address" rows="4" required></textarea>

        <label>Payment Method</label>
        <div class="payment-method">
            <label><input type="radio" name="payment" value="cash" checked> Cash on Delivery</label>
            <label><input type="radio" name="payment" value="credit"> Credit Card</label>
            <label><input type="radio" name="payment" value="debit"> Debit Card</label>
        </div>

        <!-- Bank Details (shown for credit/debit) -->
        <div class="bank-details" id="bank-details">
            <label>Card Number</label>
            <input type="text" name="cardnumber" placeholder="XXXX-XXXX-XXXX-XXXX">

            <label>Expiry Date</label>
            <input type="month" name="expiry">

            <label>CVV</label>
            <input type="number" name="cvv" placeholder="123">

            <!-- Points for debit card -->
            <div class="points-field" id="points-field">
                <label>Debit Card Points (if any)</label>
                <input type="number" name="points" placeholder="Enter points">
            </div>
        </div>

        <button type="submit">Submit Order</button>
    </form>
</main>

<script>
const paymentRadios = document.querySelectorAll('input[name="payment"]');
const bankDetails = document.getElementById('bank-details');
const pointsField = document.getElementById('points-field');

paymentRadios.forEach(radio => {
    radio.addEventListener('change', function() {
        if(this.value === 'credit') {
            bankDetails.style.display = 'block';
            pointsField.style.display = 'none';
        } else if(this.value === 'debit') {
            bankDetails.style.display = 'block';
            pointsField.style.display = 'block';
        } else {
            bankDetails.style.display = 'none';
            pointsField.style.display = 'none';
        }
    });
});
</script>

</body>
</html>
