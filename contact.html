<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StepStyle Shoes - Contact Us</title>
    <style>
        body { 
            margin:0; 
            font-family: Arial, sans-serif; 
            background:#f5f5f5; 
            color:#0d47a1; 
        }

        header { 
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            padding:20px 50px; 
            background:#0d47a1; 
            color:white; 
        }

        nav a { 
            color:white; 
            margin-left:20px; 
            text-decoration:none; 
            font-weight:bold; 
        }

        main { 
            padding:50px; 
            max-width:1000px; 
            margin:auto;
        }

        h2 { 
            text-align:center; 
            margin-bottom:40px; 
        }

        .contact-info {
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
            margin-bottom:40px;
        }

        .contact-info p {
            margin:10px 0;
            font-size:16px;
        }

        .map {
            margin-bottom:40px;
            text-align:center;
        }

        iframe {
            width:100%;
            max-width:600px;
            height:300px;
            border:0;
            border-radius:10px;
        }

        form {
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        label { 
            display:block; 
            margin-bottom:5px; 
            font-weight:bold; 
        }

        input, textarea { 
            width:100%; 
            padding:10px; 
            margin-bottom:20px; 
            border:1px solid #0d47a1; 
            border-radius:5px; 
            font-size:16px;
        }

        button {
            background:#0d47a1;
            color:white;
            padding:12px 25px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
        }

        footer {
            background:#0d47a1;
            color:white;
            text-align:center;
            padding:20px;
            font-weight:300;
            font-size:14px;
            margin-top:50px;
        }

        @media(max-width:768px){
            header, main { padding:20px; }
        }
    </style>
</head>
<body>

<header>
    <h1>StepStyle Shoes</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html">Cart</a>
    </nav>
</header>

<main>
    <h2>Contact Us</h2>

    <!-- Contact Information -->
    <div class="contact-info">
        <p>📧 Email: stepstyle@gmail.com</p>
        <p>📞 Phone: 077-1234567</p>
        <p>🏠 Address: 123 Main Street, Kegalle, Sri Lanka</p>
    </div>

    <!-- Google Map -->
    <div class="map">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3955.123456!2d80.360000!3d7.220000!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3af1ab123456789%3A0xabcdef1234567890!2sKegalle%2C%20Sri%20Lanka!5e0!3m2!1sen!2sus!4v1234567890123" 
            allowfullscreen="" 
            loading="lazy">
        </iframe>
    </div>

    <!-- Contact Form -->
    <form>
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Your email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" placeholder="Type your message here..." required></textarea>

        <button type="submit">Send Message</button>
    </form>
</main>

<footer>
    © 2026 StepStyle Shoes
</footer>

</body>
</html>
